        <div class="alert alert-success" style="margin-top:8px;font-size:11px">${isES?'Total: $2,000 — Cuadra con fondo autorizado':'Total: $2,000 — Matches authorized fund'}</div>
        <div class="mf-field full"><label>${isES?'Firmado por':'Signed by'}</label><input type="text" placeholder="${isES?'Nombre del responsable':'Name of custodian'}"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-gold" onclick="closeModal()">${isES?'Completar Arqueo':'Complete Audit'}</button>
      </div>`,
    wip: `<h3>${isES?'Nuevo Proyecto WIP':'New WIP Project'}</h3>
      <div class="modal-form">
        <div class="mf-field full"><label>${isES?'Nombre del Proyecto':'Project Name'}</label><input type="text"></div>
        <div class="mf-row">
          <div class="mf-field"><label>${isES?'Monto de Contrato':'Contract Amount'}</label><input type="number" placeholder="0.00"></div>
          <div class="mf-field"><label>${isES?'Costo Total Estimado':'Est. Total Cost'}</label><input type="number" placeholder="0.00"></div>
        </div>
        <div class="mf-row">
          <div class="mf-field"><label>${isES?'Inicio':'Start Date'}</label><input type="date"></div>
          <div class="mf-field"><label>${isES?'Fin Estimado':'Est. Completion'}</label><input type="date"></div>
        </div>
        <div class="mf-field full"><label>${isES?'Método de Reconocimiento':'Recognition Method'}</label><select><option>Cost-to-Cost (ASC 606 / IFRS 15)</option></select></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-navy" onclick="closeModal()">${isES?'Crear Proyecto':'Create Project'}</button>
      </div>`,
    reconcile: `<h3>${isES?'Conciliación Bancaria':'Bank Reconciliation'}</h3>
      <div class="alert alert-info" style="font-size:11px;margin-bottom:14px">${isES?'Motor de emparejamiento ejecutándose sobre 52 transacciones…':'Matching engine running on 52 transactions...'}</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <tr style="background:var(--stone-pale)"><th style="padding:8px;text-align:left">${isES?'Banco':'Bank'}</th><th style="padding:8px;text-align:left">${isES?'Libro':'Books'}</th><th style="padding:8px">Match</th></tr>
        ${[['$54,320','$54,320','✓'],['$12,400','$12,400','✓'],['$8,450','$8,500','≈'],['$6,100','?','!']].map(([b,bk,m])=>`<tr style="border-bottom:1px solid rgba(0,0,0,0.05)"><td style="padding:8px;font-family:var(--font-mono)">${b}</td><td style="padding:8px;font-family:var(--font-mono)">${bk}</td><td style="padding:8px;text-align:center"><span class="badge ${m==='✓'?'badge-success':m==='≈'?'badge-warning':'badge-danger'}">${m}</span></td></tr>`).join('')}
      </table>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn btn-navy" onclick="closeModal()">${isES?'Aplicar':'Apply'}</button>
      </div>`,
  };
  showModal(templates[type] || '<p>Modal not found</p>');
}
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-backdrop').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-backdrop').classList.add('hidden'); }
function submitJE() {
  logAction(state.currentUser?.toUpperCase()||'USER', 'Posted journal entry (dual-layer GAAP+IFRS)', 'medium');
  closeModal();
  showGuardianMsg('Journal entry posted. IFRS adjustment layer auto-generated.');
  refreshModule();
}
document.getElementById('modal-backdrop').addEventListener('click', e => { if (e.target === document.getElementById('modal-backdrop')) closeModal(); });

// Flash
function flash(msg) { showGuardianMsg(msg); }

// ════════════════════════════════════════ BOOT ════════════════════
window.addEventListener('load', () => {
  applyI18n();
  const devices = ['MacBook Pro','Windows 11 PC','iPad Pro','Desktop — Chrome'];
  document.getElementById('device-badge').textContent =
    '● Recognized device: ' + devices[Math.floor(Math.random()*devices.length)] + ' · TLS 1.3 Secured';
  logAction('SYSTEM','Application loaded. DR active. Backup interval: 15 min.','low');
});
</script>
</body>
</html>
