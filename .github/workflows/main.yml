<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>21 Stones Accounting ERP v2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0B1F3A;
    --navy-deep: #061326;
    --navy-mid: #132d52;
    --navy-light: #1e4278;
    --gold: #C9A84C;
    --gold-light: #e8c97a;
    --gold-pale: #f5e9c8;
    --stone: #8C8C8C;
    --stone-light: #C4C4C4;
    --stone-pale: #F2F1EF;
    --white: #FFFFFF;
    --off-white: #FAFAF8;
    --danger: #C0392B;
    --danger-light: #FADBD8;
    --success: #1A7A4A;
    --success-light: #D5F5E3;
    --warning: #B7770D;
    --warning-light: #FEF9E7;
    --info: #1B4F8A;
    --info-light: #D6EAF8;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius: 8px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 4px rgba(11,31,58,0.08);
    --shadow-md: 0 4px 20px rgba(11,31,58,0.12);
    --shadow-lg: 0 12px 48px rgba(11,31,58,0.18);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--font-body); font-size: 14px; background: var(--stone-pale); color: var(--navy); overflow: hidden; }

  /* ── SCREENS ── */
  .screen { position: fixed; inset: 0; z-index: 10; transition: opacity var(--transition), transform var(--transition); }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.98); }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 50%, var(--navy-mid) 100%);
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0;
  }
  .login-bg-pattern {
    position: absolute; inset: 0; opacity: 0.04;
    background-image: repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
    background-size: 30px 30px;
  }
  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius-xl);
    padding: 3rem 3rem 2.5rem;
    width: 420px;
    max-width: 95vw;
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
    box-shadow: var(--shadow-lg);
  }
  .login-logo { text-align: center; margin-bottom: 2rem; }
  .login-logo .logo-mark {
    width: 72px; height: 72px; margin: 0 auto 1rem;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--navy-deep);
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .login-logo h1 { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: 0.5px; }
  .login-logo .tagline { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .lang-toggle {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 1.5rem;
  }
  .lang-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.6); padding: 5px 18px; border-radius: 20px; cursor: pointer;
    font-size: 12px; font-weight: 500; transition: var(--transition); font-family: var(--font-body);
  }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--navy-deep); }
  .device-badge {
    text-align: center; margin-bottom: 1.5rem;
    font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px;
  }
  .login-form { display: flex; flex-direction: column; gap: 14px; }
  .form-group label { display: block; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 11px 14px; color: var(--white); font-size: 14px;
    font-family: var(--font-body); outline: none; transition: var(--transition);
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--gold); background: rgba(255,255,255,0.09); }
  .form-group input::placeholder { color: rgba(255,255,255,0.25); }
  .form-group select option { background: var(--navy); }
  .btn-login {
    width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
    border: none; border-radius: var(--radius); color: var(--navy-deep); font-size: 14px;
    font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: var(--transition);
    box-shadow: 0 4px 16px rgba(201,168,76,0.25); letter-spacing: 0.5px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.35); }
  .login-footer { text-align: center; margin-top: 1.5rem; font-size: 11px; color: rgba(255,255,255,0.25); }

  /* ── NDA / ETHICS SCREEN ── */
  #nda-screen {
    background: rgba(6,19,38,0.92);
    display: flex; align-items: center; justify-content: center;
  }
  .nda-card {
    background: var(--white); border-radius: var(--radius-xl); padding: 2.5rem; width: 540px; max-width: 95vw;
    box-shadow: var(--shadow-lg); max-height: 90vh; overflow-y: auto;
  }
  .nda-card h2 { font-family: var(--font-display); color: var(--navy); font-size: 22px; margin-bottom: 0.5rem; }
  .nda-card .nda-subtitle { font-size: 12px; color: var(--stone); margin-bottom: 1.5rem; }
  .nda-body {
    background: var(--stone-pale); border-radius: var(--radius); padding: 1.25rem;
    font-size: 12px; line-height: 1.8; color: var(--navy); margin-bottom: 1.5rem;
    max-height: 220px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.06);
  }
  .nda-sign { display: flex; flex-direction: column; gap: 12px; }
  .nda-sign input {
    border: 1px solid var(--stone-light); border-radius: var(--radius); padding: 10px 14px;
    font-family: var(--font-body); font-size: 14px; color: var(--navy); outline: none;
    transition: var(--transition);
  }
  .nda-sign input:focus { border-color: var(--navy); }
  .btn-sign {
    padding: 12px; background: var(--navy); color: var(--gold); border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: var(--transition);
  }
  .btn-sign:hover { background: var(--navy-mid); }

  /* ── ONBOARDING ── */
  #onboarding-screen {
    background: var(--stone-pale);
    display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .onboarding-card {
    background: var(--white); border-radius: var(--radius-xl); padding: 2.5rem; width: 580px; max-width: 100%;
    box-shadow: var(--shadow-md);
  }
  .ob-header { display: flex; align-items: center; gap: 14px; margin-bottom: 2rem; }
  .ob-header .logo-sm { width: 42px; height: 42px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--navy-deep); font-size: 16px; }
  .ob-header h2 { font-family: var(--font-display); font-size: 20px; color: var(--navy); }
  .ob-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .ob-field { display: flex; flex-direction: column; gap: 6px; }
  .ob-field.full { grid-column: 1/-1; }
  .ob-field label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--stone); }
  .ob-field input, .ob-field select {
    border: 1px solid var(--stone-light); border-radius: var(--radius); padding: 10px 12px;
    font-family: var(--font-body); font-size: 13px; color: var(--navy); outline: none; transition: var(--transition);
    background: var(--white);
  }
  .ob-field input:focus, .ob-field select:focus { border-color: var(--navy-light); }
  .ob-suggestion { font-size: 11px; color: var(--gold); margin-top: 3px; cursor: pointer; }
  .ob-suggestion:hover { color: var(--gold-light); text-decoration: underline; }
  .btn-primary {
    padding: 12px 28px; background: var(--navy); color: var(--gold); border: none; border-radius: var(--radius);
    font-size: 14px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: var(--transition);
  }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-secondary {
    padding: 12px 28px; background: transparent; color: var(--navy); border: 1px solid var(--stone-light); border-radius: var(--radius);
    font-size: 14px; font-weight: 500; font-family: var(--font-body); cursor: pointer; transition: var(--transition);
  }

  /* ── MAIN APP ── */
  #app-screen { display: flex; flex-direction: column; height: 100vh; background: var(--stone-pale); }

  /* ── TOP BAR ── */
  .topbar {
    height: 56px; background: var(--navy-deep); display: flex; align-items: center;
    padding: 0 1.5rem; gap: 1rem; border-bottom: 1px solid rgba(201,168,76,0.15);
    flex-shrink: 0; position: relative; z-index: 100;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-logo .lm { width: 30px; height: 30px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: var(--navy-deep); font-size: 13px; }
  .topbar-logo span { font-family: var(--font-display); font-size: 15px; color: var(--white); letter-spacing: 0.3px; }
  .topbar-logo .version { font-size: 10px; color: rgba(255,255,255,0.25); margin-left: 4px; letter-spacing: 1px; }
  .topbar-spacer { flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .tb-lang { font-size: 11px; color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; cursor: pointer; transition: var(--transition); }
  .tb-lang:hover { color: var(--gold); border-color: rgba(201,168,76,0.3); }
  .tb-notif { position: relative; cursor: pointer; }
  .tb-notif .notif-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); font-size: 16px; transition: var(--transition); }
  .tb-notif:hover .notif-icon { background: rgba(255,255,255,0.1); color: var(--gold); }
  .notif-badge { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; border: 2px solid var(--navy-deep); }
  .tb-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 12px 4px 4px; border-radius: 20px; transition: var(--transition); }
  .tb-user:hover { background: rgba(255,255,255,0.06); }
  .tb-user .av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--navy-deep); }
  .tb-user .user-info .name { font-size: 12px; color: var(--white); font-weight: 500; }
  .tb-user .user-info .role { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }
  .tb-logout { font-size: 11px; color: rgba(255,255,255,0.3); cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: var(--transition); }
  .tb-logout:hover { color: var(--danger); }

  /* ── LAYOUT ── */
  .app-body { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 228px; background: var(--navy); display: flex; flex-direction: column;
    border-right: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .sidebar-section { padding: 1.2rem 0.75rem 0.5rem; }
  .sidebar-section-title { font-size: 9px; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 0.5rem 0.5rem; }
  .nav-item {
    display: flex; align-items: center; gap: 9px; padding: 8px 12px; border-radius: var(--radius);
    color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; transition: var(--transition);
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
  .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold); }
  .nav-item.active .nav-icon { color: var(--gold); }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: rgba(201,168,76,0.2); color: var(--gold); font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .sidebar-client-card { margin: 0.75rem; padding: 10px 12px; background: rgba(255,255,255,0.04); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.07); }
  .scc-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 4px; }
  .scc-select { width: 100%; background: transparent; border: none; color: rgba(255,255,255,0.65); font-size: 12px; font-family: var(--font-body); outline: none; cursor: pointer; }
  .scc-select option { background: var(--navy); }

  /* ── MAIN CONTENT ── */
  .main-content { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── PAGE HEADER ── */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .page-title { font-family: var(--font-display); font-size: 22px; color: var(--navy); font-weight: 700; }
  .page-subtitle { font-size: 12px; color: var(--stone); margin-top: 3px; }
  .page-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ── CARDS ── */
  .card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid rgba(0,0,0,0.06); padding: 1.25rem; box-shadow: var(--shadow-sm); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--navy); letter-spacing: 0.2px; }
  .card-subtitle { font-size: 11px; color: var(--stone); margin-top: 2px; }

  /* ── KPI GRID ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kpi-card {
    background: var(--white); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem;
    border: 1px solid rgba(0,0,0,0.06); box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
  }
  .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-label { font-size: 11px; color: var(--stone); letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--navy); }
  .kpi-sub { font-size: 11px; color: var(--stone); margin-top: 4px; }
  .kpi-trend { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; margin-top: 5px; }
  .kpi-trend.up { background: var(--success-light); color: var(--success); }
  .kpi-trend.down { background: var(--danger-light); color: var(--danger); }

  /* ── TABLE ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .data-table th { padding: 9px 12px; text-align: left; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--stone); border-bottom: 1px solid rgba(0,0,0,0.07); background: var(--stone-pale); }
  .data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.04); color: var(--navy); vertical-align: middle; }
  .data-table tr:hover td { background: var(--stone-pale); }
  .data-table tr:last-child td { border-bottom: none; }

  /* ── BADGES ── */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
  .badge-success { background: var(--success-light); color: var(--success); }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-warning { background: var(--warning-light); color: var(--warning); }
  .badge-info { background: var(--info-light); color: var(--info); }
  .badge-neutral { background: var(--stone-pale); color: var(--stone); }
  .badge-gold { background: var(--gold-pale); color: #7a5a10; }

  /* ── BUTTONS ── */
  .btn { padding: 8px 16px; border-radius: var(--radius); font-size: 12.5px; font-weight: 500; font-family: var(--font-body); cursor: pointer; transition: var(--transition); border: 1px solid transparent; }
  .btn-navy { background: var(--navy); color: var(--gold); }
  .btn-navy:hover { background: var(--navy-mid); }
  .btn-gold { background: var(--gold); color: var(--navy-deep); }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-ghost { background: transparent; color: var(--navy); border-color: var(--stone-light); }
  .btn-ghost:hover { background: var(--stone-pale); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-sm { padding: 5px 11px; font-size: 11.5px; }
  .btn-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0; border-radius: var(--radius); }

  /* ── TABS ── */
  .tab-bar { display: flex; gap: 4px; background: var(--stone-pale); padding: 4px; border-radius: var(--radius); }
  .tab { padding: 7px 16px; border-radius: 6px; font-size: 12.5px; cursor: pointer; color: var(--stone); transition: var(--transition); border: none; background: transparent; font-family: var(--font-body); }
  .tab.active { background: var(--white); color: var(--navy); font-weight: 600; box-shadow: var(--shadow-sm); }

  /* ── PROGRESS ── */
  .progress-bar { height: 6px; background: var(--stone-pale); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

  /* ── ALERT ── */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 12.5px; border-left: 3px solid; display: flex; align-items: flex-start; gap: 8px; }
  .alert-danger { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
  .alert-warning { background: var(--warning-light); border-color: var(--warning); color: var(--warning); }
  .alert-success { background: var(--success-light); border-color: var(--success); color: var(--success); }
  .alert-info { background: var(--info-light); border-color: var(--info); color: var(--info); }

  /* ── GRID UTILS ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem; }
  .flex-row { display: flex; align-items: center; gap: 10px; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .mt-1 { margin-top: 0.5rem; }
  .mt-2 { margin-top: 1rem; }
  .text-right { text-align: right; }
  .text-mono { font-family: var(--font-mono); }
  .text-green { color: var(--success); }
  .text-red { color: var(--danger); }
  .text-gold { color: var(--gold); }
  .text-stone { color: var(--stone); }
  .bold { font-weight: 600; }

  /* ── GUARDIAN ALERT ── */
  .guardian-overlay {
    position: fixed; top: 70px; right: 20px; z-index: 9999;
    background: var(--navy-deep); border: 1px solid var(--gold); border-radius: var(--radius-lg);
    padding: 14px 18px; max-width: 320px; box-shadow: var(--shadow-lg);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .guardian-title { font-size: 12px; color: var(--gold); font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; text-transform: uppercase; }
  .guardian-msg { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; }

  /* ── MODAL ── */
  .modal-backdrop { position: fixed; inset: 0; z-index: 999; background: rgba(6,19,38,0.6); display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal-backdrop.hidden { display: none; }
  .modal { background: var(--white); border-radius: var(--radius-xl); padding: 2rem; width: 560px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal h3 { font-family: var(--font-display); font-size: 18px; color: var(--navy); margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .modal-form { display: flex; flex-direction: column; gap: 12px; }
  .mf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mf-field { display: flex; flex-direction: column; gap: 5px; }
  .mf-field.full { grid-column: 1/-1; }
  .mf-field label { font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--stone); }
  .mf-field input, .mf-field select, .mf-field textarea {
    border: 1px solid var(--stone-light); border-radius: var(--radius); padding: 9px 12px;
    font-family: var(--font-body); font-size: 13px; color: var(--navy); outline: none; transition: var(--transition);
  }
  .mf-field input:focus, .mf-field select:focus, .mf-field textarea:focus { border-color: var(--navy-light); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.06); }

  /* ── WIP METER ── */
  .wip-meter { position: relative; }
  .wip-arc { width: 100%; max-width: 200px; margin: 0 auto; }

  /* ── AUDIT LOG ── */
  .audit-entry { padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.04); display: flex; gap: 12px; align-items: flex-start; }
  .audit-time { font-family: var(--font-mono); font-size: 10px; color: var(--stone); white-space: nowrap; min-width: 80px; }
  .audit-user { font-size: 11px; font-weight: 600; color: var(--navy); min-width: 90px; }
  .audit-action { font-size: 11px; color: var(--stone); flex: 1; }
  .audit-severity { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }

  /* ── CASHFLOW CHART ── */
  .cf-chart { display: flex; align-items: flex-end; gap: 4px; height: 80px; padding: 0 4px; }
  .cf-bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: var(--transition); cursor: pointer; position: relative; }
  .cf-bar:hover::after { content: attr(data-tip); position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; font-size: 10px; padding: 3px 7px; border-radius: 4px; white-space: nowrap; }

  /* ── ACCOUNT DUAL ── */
  .dual-split { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: var(--stone-pale); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid rgba(0,0,0,0.06); }
  .dual-pane { padding: 1rem; }
  .dual-pane:first-child { border-right: 1px solid rgba(0,0,0,0.08); }
  .dual-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 6px; }
  .dual-label::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.08); }

  /* ── COMPLIANCE WALL ── */
  .compliance-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
  .compliance-item:last-child { border-bottom: none; }
  .comp-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .comp-name { font-size: 13px; font-weight: 500; color: var(--navy); }
  .comp-detail { font-size: 11px; color: var(--stone); }
  .comp-status { margin-left: auto; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  @media (max-width: 640px) { .sidebar { display: none; } .kpi-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ LOGIN ═══ -->
<div id="login-screen" class="screen">
  <div class="login-bg-pattern"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">21S</div>
      <h1>21 Stones Accounting</h1>
      <div class="tagline">Enterprise Resource Platform · v2026</div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>
    <div class="device-badge" id="device-badge">● Recognized device: MacBook Pro · TLS 1.3 Secured</div>
    <div class="login-form">
      <div class="form-group">
        <label id="lbl-role">Access Level</label>
        <select id="login-role">
          <option value="">— Select role —</option>
          <option value="A">Level A — Partner (Socio)</option>
          <option value="B">Level B — Supervisor</option>
          <option value="C">Level C — Staff</option>
        </select>
      </div>
      <div class="form-group">
        <label id="lbl-id">User ID</label>
        <input type="text" id="login-user" placeholder="firstname.lastname" autocomplete="username">
      </div>
      <div class="form-group">
        <label id="lbl-pass">Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" onclick="doLogin()" id="btn-signin">Sign In →</button>
    </div>
    <div class="login-footer">21 Stones Accounting LLC · SOC 2 Type II · Encrypted</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ NDA ═══ -->
<div id="nda-screen" class="screen hidden">
  <div class="nda-card">
    <h2 id="nda-title">Ethics & Confidentiality Agreement</h2>
    <div class="nda-subtitle" id="nda-sub">Required before accessing client data. This session is logged.</div>
    <div class="nda-body" id="nda-body">
      INTERNAL NON-DISCLOSURE & ETHICS AGREEMENT — 21 STONES ACCOUNTING LLC<br><br>
      By signing below, I, the undersigned staff or supervisor, affirm that:<br><br>
      1. I will maintain strict confidentiality of all client financial data, records, and personally identifiable information accessed through this platform.<br>
      2. I will not share, export, or disclose any client data to unauthorized parties, under any circumstances, in digital or physical form.<br>
      3. I will access only the clients and modules to which I have been formally assigned by a Partner (Level A).<br>
      4. I acknowledge that all my actions within this system are logged, timestamped, and subject to review by Level A Partners (Guardián 21 monitoring).<br>
      5. I understand that any unauthorized access attempt, unusual manual adjustment, or data export will trigger an immediate alert to the supervising Partner.<br>
      6. Violation of this agreement may result in termination of employment and legal action pursuant to applicable law and the CPA ethical standards.<br><br>
      This agreement is binding for the current session and renewed at each login. Digital signature below constitutes a legally binding electronic signature under ESIGN Act (15 U.S.C. § 7001).
    </div>
    <div class="nda-sign">
      <input type="text" id="nda-sig" placeholder="Type your full legal name to sign" />
      <input type="text" id="nda-emp" placeholder="Employee ID" />
      <button class="btn-sign" onclick="signNDA()" id="btn-sign-nda">✍ Sign & Enter Platform</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ ONBOARDING ═══ -->
<div id="onboarding-screen" class="screen hidden">
  <div class="onboarding-card">
    <div class="ob-header">
      <div class="logo-sm">21S</div>
      <div>
        <h2 id="ob-title">New Client Onboarding</h2>
        <div style="font-size:12px;color:var(--stone)" id="ob-desc">Set up a new client entity in the system</div>
      </div>
    </div>
    <div class="ob-grid">
      <div class="ob-field full">
        <label id="ob-lbl-name">Legal Entity Name</label>
        <input type="text" id="ob-name" placeholder="ABC Construction LLC">
        <div class="ob-suggestion" onclick="autoFill('name')" id="ob-sug-name">💡 Suggestion: Skyline Builders Inc.</div>
      </div>
      <div class="ob-field">
        <label id="ob-lbl-ein">EIN / Tax ID</label>
        <input type="text" id="ob-ein" placeholder="XX-XXXXXXX">
      </div>
      <div class="ob-field">
        <label id="ob-lbl-type">Entity Type</label>
        <select id="ob-entity">
          <option value="">— Select —</option>
          <option>LLC</option><option>S-Corp</option><option>C-Corp</option>
          <option>Partnership</option><option>Sole Proprietor</option>
        </select>
        <div class="ob-suggestion" onclick="autoFill('entity')" id="ob-sug-entity">💡 Common for construction: LLC</div>
      </div>
      <div class="ob-field">
        <label id="ob-lbl-sector">Industry Sector</label>
        <select id="ob-sector">
          <option value="">— Select —</option>
          <option>Construction & Contracting</option>
          <option>Real Estate</option>
          <option>Manufacturing</option>
          <option>Professional Services</option>
          <option>Healthcare</option>
          <option>Retail & Distribution</option>
          <option>Technology</option>
          <option>Non-Profit</option>
        </select>
        <div class="ob-suggestion" onclick="autoFill('sector')" id="ob-sug-sector">💡 Detected from name: Construction & Contracting</div>
      </div>
      <div class="ob-field">
        <label id="ob-lbl-std">Accounting Standard</label>
        <select id="ob-std">
          <option>US GAAP</option>
          <option>IFRS (NIIF)</option>
          <option>Dual — GAAP + IFRS</option>
        </select>
      </div>
      <div class="ob-field">
        <label id="ob-lbl-prev">Previous System</label>
        <select id="ob-prev">
          <option value="">— Select —</option>
          <option>QuickBooks</option><option>Sage 300</option><option>Viewpoint Vista</option>
          <option>Procore</option><option>Excel Only</option><option>None</option>
        </select>
        <div class="ob-suggestion" onclick="autoFill('prev')" id="ob-sug-prev">💡 Common: QuickBooks → 21 Stones</div>
      </div>
      <div class="ob-field full">
        <label id="ob-lbl-addr">Business Address</label>
        <input type="text" id="ob-addr" placeholder="123 Main St, Suite 400, Miami, FL 33101">
      </div>
    </div>
    <div class="flex-row" style="justify-content:flex-end;gap:10px">
      <button class="btn-secondary" onclick="skipOnboarding()" id="ob-btn-skip">Manual Entry</button>
      <button class="btn-primary" onclick="completeOnboarding()" id="ob-btn-create">Create Client Profile →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MAIN APP ═══ -->
<div id="app-screen" class="screen hidden">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="lm">21S</div>
      <span>21 Stones Accounting <span class="version">ERP 2026</span></span>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <div class="tb-lang" onclick="toggleLang()" id="lang-indicator">EN / ES</div>
      <div class="tb-notif" onclick="showGuardian()">
        <div class="notif-icon">🔔</div>
        <div class="notif-badge"></div>
      </div>
      <div class="tb-user">
        <div class="av" id="user-av">JD</div>
        <div class="user-info">
          <div class="name" id="user-name-display">John Doe</div>
          <div class="role" id="user-role-display">Partner · Level A</div>
        </div>
      </div>
      <div class="tb-logout" onclick="doLogout()">⏻</div>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div style="padding:12px 12px 0">
        <div class="sidebar-client-card">
          <div class="scc-label" id="sb-lbl-client">Active Client</div>
          <select class="scc-select" id="client-select" onchange="switchClient()">
            <option>Skyline Builders Inc.</option>
            <option>Oceanic Dev. Group</option>
            <option>Rivera & Associates</option>
            <option>NovaTech Solutions</option>
          </select>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title" id="sb-sec-core">Core</div>
        <div class="nav-item active" onclick="showModule('dashboard')">
          <span class="nav-icon">◈</span> <span id="nav-dashboard">Dashboard</span>
        </div>
        <div class="nav-item" onclick="showModule('gl')">
          <span class="nav-icon">📒</span> <span id="nav-gl">General Ledger</span>
        </div>
        <div class="nav-item" onclick="showModule('treasury')">
          <span class="nav-icon">🏦</span> <span id="nav-treasury">Treasury & Cash</span>
        </div>
        <div class="nav-item" onclick="showModule('assets')">
          <span class="nav-icon">🏗</span> <span id="nav-assets">Fixed Assets</span>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title" id="sb-sec-constr">Construction</div>
        <div class="nav-item" onclick="showModule('wip')">
          <span class="nav-icon">📐</span> <span id="nav-wip">WIP / Job Cost</span>
          <span class="nav-badge">3</span>
        </div>
        <div class="nav-item" onclick="showModule('budget')">
          <span class="nav-icon">📊</span> <span id="nav-budget">Live Budget</span>
        </div>
        <div class="nav-item" onclick="showModule('subs')">
          <span class="nav-icon">👷</span> <span id="nav-subs">Subcontractors</span>
          <span class="nav-badge" style="background:rgba(192,57,43,0.15);color:var(--danger)">2</span>
        </div>
      </div>
      <div class="sidebar-section" id="sb-admin-section">
        <div class="sidebar-section-title" id="sb-sec-admin">Administration</div>
        <div class="nav-item" onclick="showModule('security')">
          <span class="nav-icon">🔐</span> <span id="nav-security">Security & Users</span>
        </div>
        <div class="nav-item" onclick="showModule('audit')">
          <span class="nav-icon">📋</span> <span id="nav-audit">Audit Log</span>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="main-content">
      <!-- Content injected by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MODAL ═══ -->
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div class="modal" id="modal-body"></div>
</div>

<!-- ═══════════════════════════════════════════════════════ GUARDIAN OVERLAY ═══ -->
<div id="guardian-overlay" style="display:none" class="guardian-overlay">
  <div class="guardian-title">🛡 Guardián 21 Alert</div>
  <div class="guardian-msg" id="guardian-msg"></div>
  <div style="margin-top:8px;text-align:right"><span style="font-size:11px;color:var(--gold);cursor:pointer" onclick="closeGuardian()">Dismiss ✕</span></div>
</div>

<script>
// ════════════════════════════════════════ STATE ════════════════════
const state = {
  lang: 'en', currentUser: null, currentRole: null,
  currentModule: 'dashboard', currentClient: 'Skyline Builders Inc.',
  auditLog: [], guardianAlerts: [],
};

// ════════════════════════════════════════ I18N ════════════════════
const T = {
  en: {
    signin: 'Sign In →', role: 'Access Level', uid: 'User ID', pwd: 'Password',
    ndaTitle: 'Ethics & Confidentiality Agreement', ndaSub: 'Required before accessing client data.',
    ndaSign: '✍ Sign & Enter Platform', obTitle: 'New Client Onboarding', obCreate: 'Create Client Profile →',
    obSkip: 'Manual Entry', activeClient: 'Active Client',
    dashboard: 'Dashboard', gl: 'General Ledger', treasury: 'Treasury & Cash', assets: 'Fixed Assets',
    wip: 'WIP / Job Cost', budget: 'Live Budget', subs: 'Subcontractors',
    security: 'Security & Users', audit: 'Audit Log',
    core: 'Core', construction: 'Construction', administration: 'Administration',
    totalRevenue: 'Total Revenue (MTD)', netIncome: 'Net Income', cashPos: 'Cash Position',
    billingWip: 'Billing vs WIP', budgetUtil: 'Budget Utilization', retainageHeld: 'Retainage Held',
    welcome: 'Good morning', today: 'Today',
  },
  es: {
    signin: 'Ingresar →', role: 'Nivel de Acceso', uid: 'ID de Usuario', pwd: 'Contraseña',
    ndaTitle: 'Acuerdo de Ética y Confidencialidad', ndaSub: 'Requerido antes de acceder a datos del cliente.',
    ndaSign: '✍ Firmar e Ingresar', obTitle: 'Alta de Nuevo Cliente', obCreate: 'Crear Perfil de Cliente →',
    obSkip: 'Entrada Manual', activeClient: 'Cliente Activo',
    dashboard: 'Tablero', gl: 'Mayor General', treasury: 'Tesorería y Caja', assets: 'Activos Fijos',
    wip: 'WIP / Costo de Obra', budget: 'Presupuesto Vivo', subs: 'Subcontratistas',
    security: 'Seguridad y Usuarios', audit: 'Bitácora de Auditoría',
    core: 'Núcleo', construction: 'Construcción', administration: 'Administración',
    totalRevenue: 'Ingresos Totales (MTD)', netIncome: 'Utilidad Neta', cashPos: 'Posición de Caja',
    billingWip: 'Facturación vs WIP', budgetUtil: 'Uso de Presupuesto', retainageHeld: 'Retención',
    welcome: 'Buenos días', today: 'Hoy',
  }
};
function t(key) { return T[state.lang][key] || key; }

// ════════════════════════════════════════ LANG ════════════════════
function setLang(l) {
  state.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  applyI18n();
  logAction('SYSTEM', 'Language changed to ' + l.toUpperCase(), 'low');
}
function toggleLang() { setLang(state.lang === 'en' ? 'es' : 'en'); refreshModule(); }
function applyI18n() {
  const ids = ['btn-signin','lbl-role','lbl-id','lbl-pass','nda-title','nda-sub','btn-sign-nda',
    'ob-title','ob-btn-create','ob-btn-skip','sb-lbl-client',
    'nav-dashboard','nav-gl','nav-treasury','nav-assets','nav-wip','nav-budget','nav-subs',
    'nav-security','nav-audit','sb-sec-core','sb-sec-constr','sb-sec-admin','lang-indicator'];
  const map = {
    'btn-signin':'signin','lbl-role':'role','lbl-id':'uid','lbl-pass':'pwd',
    'nda-title':'ndaTitle','nda-sub':'ndaSub','btn-sign-nda':'ndaSign',
    'ob-title':'obTitle','ob-btn-create':'obCreate','ob-btn-skip':'obSkip',
    'sb-lbl-client':'activeClient','nav-dashboard':'dashboard','nav-gl':'gl',
    'nav-treasury':'treasury','nav-assets':'assets','nav-wip':'wip','nav-budget':'budget',
    'nav-subs':'subs','nav-security':'security','nav-audit':'audit',
    'sb-sec-core':'core','sb-sec-constr':'construction','sb-sec-admin':'administration',
    'lang-indicator': null,
  };
  for (const id in map) {
    const el = document.getElementById(id);
    if (!el) continue;
    if (id === 'lang-indicator') { el.textContent = state.lang === 'en' ? 'EN / ES' : 'ES / EN'; continue; }
    el.textContent = t(map[id]);
  }
  const ob_lbl_ids = ['ob-lbl-name','ob-lbl-ein','ob-lbl-type','ob-lbl-sector','ob-lbl-std','ob-lbl-prev','ob-lbl-addr'];
  const ob_lbl_en = ['Legal Entity Name','EIN / Tax ID','Entity Type','Industry Sector','Accounting Standard','Previous System','Business Address'];
  const ob_lbl_es = ['Nombre Legal de la Entidad','EIN / RFC / NIT','Tipo de Entidad','Sector Industrial','Norma Contable','Sistema Anterior','Dirección'];
  ob_lbl_ids.forEach((id,i) => { const el=document.getElementById(id); if(el) el.textContent = state.lang==='en'?ob_lbl_en[i]:ob_lbl_es[i]; });
}

// ════════════════════════════════════════ AUTH ════════════════════
function doLogin() {
  const role = document.getElementById('login-role').value;
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!role || !user || !pass) { flash('Please complete all fields / Complete todos los campos'); return; }
  if (pass.length < 4) { flash('Invalid credentials / Credenciales incorrectas'); return; }
  state.currentRole = role; state.currentUser = user;
  logAction(user.toUpperCase(), 'Successful login from recognized device', 'low');
  if (role === 'A') { showOnboarding(); }
  else { showNDA(); }
}

function showNDA() { switchScreen('nda-screen'); }
function signNDA() {
  const sig = document.getElementById('nda-sig').value.trim();
  const emp = document.getElementById('nda-emp').value.trim();
  if (!sig || !emp) { flash('Signature and Employee ID required'); return; }
  logAction(state.currentUser.toUpperCase(), `Signed NDA/Ethics agreement. Sig: "${sig}" EmpID: ${emp}`, 'low');
  showOnboarding();
}
function showOnboarding() { switchScreen('onboarding-screen'); }
function skipOnboarding() { enterApp(); }
function completeOnboarding() {
  const name = document.getElementById('ob-name').value.trim();
  if (name) { state.currentClient = name; document.getElementById('client-select').options[0].text = name; }
  logAction(state.currentUser.toUpperCase(), `New client profile created: "${name || 'Manual Entry'}"`, 'medium');
  enterApp();
}
function autoFill(field) {
  if (field === 'name') document.getElementById('ob-name').value = 'Skyline Builders Inc.';
  if (field === 'entity') document.getElementById('ob-entity').value = 'LLC';
  if (field === 'sector') document.getElementById('ob-sector').value = 'Construction & Contracting';
  if (field === 'prev') document.getElementById('ob-prev').value = 'QuickBooks';
}
function enterApp() {
  switchScreen('app-screen');
  updateUserDisplay();
  if (state.currentRole !== 'A') { hideSensitiveNav(); }
  showModule('dashboard');
  setTimeout(() => showGuardianMsg('Session active. Guardián 21 monitoring enabled. All actions are logged.'), 1800);
}
function doLogout() {
  logAction(state.currentUser?.toUpperCase() || 'USER', 'Logout', 'low');
  state.currentUser = null; state.currentRole = null;
  document.getElementById('login-role').value='';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  switchScreen('login-screen');
}
function updateUserDisplay() {
  const initials = (state.currentUser||'').split('.').map(s=>s[0]?.toUpperCase()||'').join('').slice(0,2)||'U';
  document.getElementById('user-av').textContent = initials;
  document.getElementById('user-name-display').textContent = state.currentUser || 'User';
  const roleNames = { A: 'Partner · Level A', B: 'Supervisor · Level B', C: 'Staff · Level C' };
  document.getElementById('user-role-display').textContent = roleNames[state.currentRole] || '';
}
function hideSensitiveNav() {
  if (state.currentRole !== 'A') {
    document.getElementById('sb-admin-section').style.display = 'none';
  }
}
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ════════════════════════════════════════ GUARDIAN ════════════════
function logAction(user, action, severity) {
  const ts = new Date().toLocaleTimeString();
  state.auditLog.unshift({ ts, user, action, severity });
  if (severity === 'high') { showGuardianMsg(`⚠ Unusual action by ${user}: ${action}`); }
}
function showGuardian() {
  const msg = state.auditLog.length ? `Last: ${state.auditLog[0].user} — ${state.auditLog[0].action}` : 'No recent alerts.';
  showGuardianMsg(msg);
}
function showGuardianMsg(msg) {
  const el = document.getElementById('guardian-overlay');
  document.getElementById('guardian-msg').textContent = msg;
  el.style.display = 'block';
  clearTimeout(window._gTimer);
  window._gTimer = setTimeout(() => { el.style.display='none'; }, 5000);
}
function closeGuardian() { document.getElementById('guardian-overlay').style.display='none'; }

// ════════════════════════════════════════ NAVIGATION ════════════════
function showModule(mod) {
  if (state.currentRole !== 'A') {
    if (['audit','security'].includes(mod)) {
      logAction(state.currentUser?.toUpperCase()||'USER', `Unauthorized access attempt: module "${mod}"`, 'high');
      showGuardianMsg(`🚫 Access denied. Module "${mod}" requires Level A. Alert sent to Partner.`);
      return;
    }
  }
  state.currentModule = mod;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+mod);
  if (navEl) navEl.parentElement.classList.add('active');
  logAction(state.currentUser?.toUpperCase()||'USER', `Viewed module: ${mod}`, 'low');
  renderModule(mod);
}
function refreshModule() { renderModule(state.currentModule); }
function switchClient() {
  state.currentClient = document.getElementById('client-select').value;
  logAction(state.currentUser?.toUpperCase()||'USER', `Switched client to: ${state.currentClient}`, 'low');
  renderModule(state.currentModule);
}

// ════════════════════════════════════════ MODULES ════════════════
function renderModule(mod) {
  const mc = document.getElementById('main-content');
  const renderers = {
    dashboard: renderDashboard, gl: renderGL, treasury: renderTreasury,
    assets: renderAssets, wip: renderWIP, budget: renderBudget,
    subs: renderSubs, security: renderSecurity, audit: renderAuditLog,
  };
  mc.innerHTML = '';
  if (renderers[mod]) mc.innerHTML = renderers[mod]();
  else mc.innerHTML = `<div class="card"><p>Module: ${mod}</p></div>`;
}

